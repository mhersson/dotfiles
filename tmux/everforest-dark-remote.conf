## COLORSCHEME: everforest dark medium (remote/SSH variant — blue accents)
#
# Palette:
#   bg0     #2d353b   bg1     #343f44   bg2     #3d484d   bg3     #475258
#   fg      #d3c6aa   green   #a7c080   red     #e67e80   orange  #e69875
#   yellow  #dbbc7f   aqua    #83c092   blue    #7fbbb3   purple  #d699b6

set-option -g status 2
set-option -g status-format[1] ''

# Default statusbar colors
set-option -g status-style bg=default,fg=#d3c6aa

# Activity alert
set-window-option -g window-status-activity-style bg=default,fg=#e69875

# Active window title
set-window-option -g window-status-current-style bg=default,fg=#d3c6aa

# Pane borders
set-option -g pane-active-border-style fg=#7fbbb3
set-option -g pane-border-style fg=#475258

# Messages
set-option -g message-style bg=#343f44,fg=#d3c6aa
set-option -g message-command-style bg=#343f44,fg=#d3c6aa

## Layout
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "100"
set-option -g status-right-style none
set-option -g status-right-length "100"
set-window-option -g window-status-separator " "

# Left: session pill (blue, turns orange when prefix is active)
set-option -g status-left "#{?client_prefix,#[fg=#e69875]#[bg=default]#[bg=#e69875]#[fg=#2d353b]#[bold]  #S #[fg=#e69875]#[bg=default]#[nobold],#[fg=#7fbbb3]#[bg=default]#[bg=#7fbbb3]#[fg=#2d353b]#[bold]  #S #[fg=#7fbbb3]#[bg=default]#[nobold]} "

# Right: host -> date -> time (powerline, building rightward)
set-option -g status-right "#[fg=#343f44,bg=default]#[bg=#343f44,fg=#7fbbb3]  #h #[fg=#3d484d,bg=#343f44]#[bg=#3d484d,fg=#d3c6aa]  %Y-%m-%d #[fg=#7fbbb3,bg=#3d484d]#[bg=#7fbbb3,fg=#2d353b,bold]  %H:%M #[nobold]"

# Active window: blue pill with zoom indicator
set-window-option -g window-status-current-format "#[fg=#7fbbb3,bg=default]#[bg=#7fbbb3,fg=#2d353b,bold] #{?#{==:#{window_index},0},⓿,#{?#{==:#{window_index},1},❶,#{?#{==:#{window_index},2},❷,#{?#{==:#{window_index},3},❸,#{?#{==:#{window_index},4},❹,#{?#{==:#{window_index},5},❺,#{?#{==:#{window_index},6},❻,#{?#{==:#{window_index},7},❼,#{?#{==:#{window_index},8},❽,#{?#{==:#{window_index},9},❾,#I}}}}}}}}}} #W#{?window_zoomed_flag, ,} #[fg=#7fbbb3,bg=default,nobold]"

# Inactive window: subtle pill
set-window-option -g window-status-format "#[fg=#343f44,bg=default]#[bg=#343f44,fg=#d3c6aa] #{?#{==:#{window_index},0},⓪,#{?#{==:#{window_index},1},①,#{?#{==:#{window_index},2},②,#{?#{==:#{window_index},3},③,#{?#{==:#{window_index},4},④,#{?#{==:#{window_index},5},⑤,#{?#{==:#{window_index},6},⑥,#{?#{==:#{window_index},7},⑦,#{?#{==:#{window_index},8},⑧,#{?#{==:#{window_index},9},⑨,#I}}}}}}}}}} #W #[fg=#343f44,bg=default]"

