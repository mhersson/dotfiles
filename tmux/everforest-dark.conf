## COLORSCHEME: everforest dark medium
#
# Palette:
#   bg0     #2d353b   bg1     #343f44   bg2     #3d484d   bg3     #475258
#   fg      #d3c6aa   green   #a7c080   red     #e67e80   orange  #e69875
#   yellow  #dbbc7f   aqua    #83c092   blue    #7fbbb3   purple  #d699b6

set-option -g status "on"

# Default statusbar colors
set-option -g status-style bg=default,fg=#d3c6aa

# Activity alert
set-window-option -g window-status-activity-style bg=default,fg=#e69875

# Active window title
set-window-option -g window-status-current-style bg=default,fg=#d3c6aa

# Pane borders
set-option -g pane-active-border-style fg=#a7c080
set-option -g pane-border-style fg=#475258

# Messages
set-option -g message-style bg=#343f44,fg=#d3c6aa
set-option -g message-command-style bg=#343f44,fg=#d3c6aa

## Layout
set-option -g status-justify "left"
set-option -g status-left-style none
set-option -g status-left-length "100"
set-option -g status-right-style none
set-option -g status-right-length "100"
set-window-option -g window-status-separator " "

# Left: session pill (green, turns orange when prefix is active)
set-option -g status-left "#{?client_prefix,#[fg=#e69875]#[bg=default]о‚¶#[bg=#e69875]#[fg=#2d353b]#[bold] п„  #S #[fg=#e69875]#[bg=default]#[nobold]о‚ґ,#[fg=#a7c080]#[bg=default]о‚¶#[bg=#a7c080]#[fg=#2d353b]#[bold] п„  #S #[fg=#a7c080]#[bg=default]#[nobold]о‚ґ} "

# Right: host -> date -> time (powerline, building rightward)
set-option -g status-right "#[fg=#343f44,bg=default]о‚І#[bg=#343f44,fg=#7fbbb3] п„€ #h #[fg=#3d484d,bg=#343f44]о‚І#[bg=#3d484d,fg=#d3c6aa] пЃі %Y-%m-%d #[fg=#a7c080,bg=#3d484d]о‚І#[bg=#a7c080,fg=#2d353b,bold] пЂ— %H:%M #[nobold]"

# Active window: green pill with zoom indicator
set-window-option -g window-status-current-format "#[fg=#a7c080,bg=default]о‚¶#[bg=#a7c080,fg=#2d353b,bold] #{?#{==:#{window_index},0},в“ї,#{?#{==:#{window_index},1},вќ¶,#{?#{==:#{window_index},2},вќ·,#{?#{==:#{window_index},3},вќё,#{?#{==:#{window_index},4},вќ№,#{?#{==:#{window_index},5},вќє,#{?#{==:#{window_index},6},вќ»,#{?#{==:#{window_index},7},вќј,#{?#{==:#{window_index},8},вќЅ,#{?#{==:#{window_index},9},вќѕ,#I}}}}}}}}}} #W#{?window_zoomed_flag, пЃҐ,} #[fg=#a7c080,bg=default,nobold]о‚ґ"

# Inactive window: subtle pill
set-window-option -g window-status-format "#[fg=#343f44,bg=default]о‚¶#[bg=#343f44,fg=#d3c6aa] #{?#{==:#{window_index},0},в“Є,#{?#{==:#{window_index},1},в‘ ,#{?#{==:#{window_index},2},в‘Ў,#{?#{==:#{window_index},3},в‘ў,#{?#{==:#{window_index},4},в‘Ј,#{?#{==:#{window_index},5},в‘¤,#{?#{==:#{window_index},6},в‘Ґ,#{?#{==:#{window_index},7},в‘¦,#{?#{==:#{window_index},8},в‘§,#{?#{==:#{window_index},9},в‘Ё,#I}}}}}}}}}} #W #[fg=#343f44,bg=default]о‚ґ"

