# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

set -g mouse on

set-window-option -g mode-keys vi
set-option -s escape-time 0
set-option -g repeat-time 250

set -g default-terminal tmux-256color
set-option -sa terminal-overrides ',*:RGB'

# set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[5 q' # Set cursor to bar

# visual notification of activity in other windows
# setw -g monitor-activity on

# Index windows from 1 and not 0
set -g base-index 1

# Renumber windows when one is closed
set-option -g renumber-windows on

# Increase the default scrollback buffer
set-option -g history-limit 10000

# source status line configuration — blue theme over SSH, green locally
if-shell '[ -n "$SSH_CLIENT" ] || [ -n "$SSH_TTY" ] || [ -f ~/.tmux-remote ]' \
    'source-file ~/.dotfiles/tmux/everforest-dark-remote.conf' \
    'source-file ~/.dotfiles/tmux/everforest-dark.conf'

# Create new-window (tabs)
bind -n C-t new-window

bind -n M-V split-window -h -c "#{pane_current_path}"
bind -n M-v split-window -v -c "#{pane_current_path}"

# Toggle zoom with M-z
bind -n M-z resize-pane -Z

# Navigate panes with vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Resize panes
bind -n C-Left resize-pane -L 5
bind -n C-Down resize-pane -D 5
bind -n C-Up resize-pane -U 5
bind -n C-Right resize-pane -R 5

# Status Bar
set-option -g status-position top # position the status bar at top of screen
set -g status-right-length 100

