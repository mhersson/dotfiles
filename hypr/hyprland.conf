# This is an example Hyprland config file.
#
# Refer to the wiki for more information.

#
# Please note not all available settings / options are set here.
# For a full list, see the wiki
#

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1
#monitor=,2560x1440@240,0x0,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/macchiato.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us,no
    kb_variant =
    kb_model =
    kb_options = grp:caps_toggle
    kb_rules =
    repeat_rate = 25
    repeat_delay = 225

    follow_mouse = 1

    touchpad {
        natural_scroll = false
        tap-to-click = false
        disable_while_typing  = true
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    layout = dwindle

    col.active_border = 0xff8aadf4
    col.inactive_border = 0xff494d64

    gaps_in = 10
    gaps_out = 10
    border_size = 3
}

group {
    col.border_active = 0xfff38ba8
    col.border_inactive = 0xff494d64

  groupbar {
      enabled = true
      col.active = 0xfff38ba8
      col.inactive = 0xff494d64
      render_titles = false
      gradients = false
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 10
    blur {
      enabled = true
      size = 3
      passes = 1

      vibrancy = 0.1696
    }


    shadow {
      range = 4
      render_power = 3
      color = rgba(1a1a1aee)
    }

    dim_special = 0.0
}

animations {
    enabled = true

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
    animation = specialWorkspace, 1, 5, myBezier, slidevert
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = true # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
  # new_is_master = true
}


ecosystem {
  no_update_news = true
  no_donation_nag = true
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
device {
    name = logitech-g602-1
    sensitivity = 0.2
}

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# windowrulev2 = float,class:^(.*)$
windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule = float on, match:class ^feh$
windowrule = float on, match:class ^mpv$
windowrule = float on, match:class ^xeyes$
windowrule = float on, match:class ^Steam$
windowrule = float on, match:class ^signal$
windowrule = float on, match:class ^xfreerdp$
windowrule = float on, match:class ^org\.pulseaudio\.pavucontrol$
windowrule = float on, match:class ^blueman-manager$
windowrule = float on, match:class ^\.blueman-manager-wrapped$
windowrule = float on, match:class ^remote-viewer$
windowrule = float on, match:class ^scratchpad$
windowrule = float on, match:class ^Slack$, match:title .Huddle.
windowrule = float on, match:class ^firefox$, match:title ^Picture-in-Picture$

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = ALT

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

bind = $mainMod, B, exec, killall -SIGUSR1 waybar # toggle waybar
bind = $mainMod, C, centerwindow,
bind = $mainMod, E, exec, thunar
bind = $mainMod SHIFT, return, exec, ghostty
bind = $mainMod SHIFT, E, exit,
bind = $mainMod, F, fullscreen,
bind = $mainMod SHIFT, space, togglefloating,
bind = $mainMod, P, exec, pavucontrol
bind = $mainMod, Q, killactive,
bind = $mainMod, return, exec, fuzzel
bind = $mainMod, R, alterzorder, top,address:$window_address # raise window to top of z-order
bind = $mainMod SHIFT, R, alterzorder, bottom,address:$window_address # lower window to bottom of z-order
bind = $mainMod, S, pseudo, # dwindle
bind = $mainMod, T, togglesplit, # dwindle
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, cyclenext
bind = $mainMod, Tab, alterzorder, top,address:$window_address

# Scratchpad
bind = $mainMod, grave, togglespecialworkspace,
bind = $mainMod SHIFT, grave, movetoworkspace, special

# MediaControls
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioNext, exec, playerctl next
bind = ,XF86AudioPrev, exec, playerctl previous

# Screenshots
bind = $mainMod SHIFT,F11, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, F11, exec, grim -g "$(slurp)" - | swappy -f -

# Toggle monitor resolution
bind = $mainMod SHIFT,F12, exec, ~/.config/hypr/toggle-resolution
bind = $mainMod, F12, exec, ~/.config/hypr/restart-xdg-desktop-portal

# Window binds
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

bind = $mainMod SHIFT, h, swapwindow, l
bind = $mainMod SHIFT, j, swapwindow, d
bind = $mainMod SHIFT, k, swapwindow, u
bind = $mainMod SHIFT, l, swapwindow, r

bind = $mainMod SUPER, h, movewindow, l
bind = $mainMod SUPER, j, movewindow, d
bind = $mainMod SUPER, k, movewindow, u
bind = $mainMod SUPER, l, movewindow, r

bind = $mainMod CONTROL, h, resizeactive, -50 0
bind = $mainMod CONTROL, j, resizeactive, 0 50
bind = $mainMod CONTROL, k, resizeactive, 0 -50
bind = $mainMod CONTROL, l, resizeactive, 50 0

# Group binds
bind = SUPER SHIFT, h, movewindoworgroup, l
bind = SUPER SHIFT, j, movewindoworgroup, d
bind = SUPER SHIFT, k, movewindoworgroup, u
bind = SUPER SHIFT, l, movewindoworgroup, r

# Cycle through windows in group
bind = SUPER, Tab, changegroupactive

# Switch active window in group
bind = SUPER, 1, changegroupactive, 1
bind = SUPER, 2, changegroupactive, 2
bind = SUPER, 3, changegroupactive, 3
bind = SUPER, 4, changegroupactive, 4
bind = SUPER, 5, changegroupactive, 5
bind = SUPER, 6, changegroupactive, 6
bind = SUPER, 7, changegroupactive, 7
bind = SUPER, 8, changegroupactive, 8
bind = SUPER, 9, changegroupactive, 9

# Move active window within group
bind = SUPER SHIFT, f, movegroupwindow, f
bind = SUPER SHIFT, b, movegroupwindow, b

# Workspaces binds
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9
bind = $mainMod SHIFT, 0, movetoworkspacesilent, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#exec-once = hyprpaper
exec-once = hypridle
# exec-once = gammastep -c ~/.dotfiles/gammastep/gammastep.conf
exec-once = dunst -conf ~/.dotfiles/dunst/dunstrc
exec-once = waybar

exec-once = [workspace special silent] ghostty
exec-once = ghostty
exec-once = firefox
# exec-once = signal-desktop --ozone-platform-hint=auto --start-in-tray
